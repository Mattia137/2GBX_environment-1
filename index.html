<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NYC_HYPEROBJECT_STABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Fragment Mono', monospace; }
        #renderCanvas { width: 100%; height: 100%; position: absolute; z-index: 1; outline: none; touch-action: none; }
        
        /* Solid Color Overlay - Green Screen Blend */
        #color-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #191f1d; 
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 5;
        }

        #interface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: #ffffff; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; }
        .hud-cluster { position: absolute; display: flex; flex-direction: column; padding: 30px; }
        .top-left { top: 0; left: 0; } .top-right { top: 0; right: 0; text-align: right; }
        .bottom-left { bottom: 0; left: 0; } .bottom-right { bottom: 0; right: 0; text-align: right; }
        .label { opacity: 0.4; font-size: 7px; margin-bottom: 4px; } .val { opacity: 0.9; font-variant-numeric: tabular-nums; }
        
        /* Camera Controls */
        .camera-controls { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: auto; z-index: 15; }
        .cam-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; font-family: 'Fragment Mono', monospace; font-size: 8px; cursor: pointer; text-align: left; transition: all 0.3s; width: 160px; }
        .cam-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        .cam-btn.active { background: #fff; color: #000; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        #bar-frame { width: 240px; height: 1px; background: rgba(255,255,255,0.1); margin-top: 28px; }
        #bar-fill { width: 0%; height: 100%; background: #ffffff; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="color-overlay"></div> 
    <div id="interface">
        <div class="hud-cluster top-left"><div class="label" id="unit-count">0 UNITS_ACTIVE</div><div class="val">TRAFFIC // LIVE</div></div>
        
        <div class="camera-controls">
            <button class="cam-btn active" id="btn-fps">FIRST PERSON VIEW</button>
            <button class="cam-btn" id="btn-god">GOD'S EYE VIEW</button>
        </div>

        <div class="hud-cluster top-right"><div class="label">Atmosphere</div><div class="val" id="fog-val">VOID_SYNC_ON</div></div>
        <div class="hud-cluster bottom-left"><div class="label">Coordinate</div><div class="val" id="coord-val">0.00 // 0.00 // 0.00</div></div>
        <div class="hud-cluster bottom-right"><div class="label">Target</div><div class="val" id="target-id">Scanning...</div></div>
    </div>
    <div id="loading-overlay"><div id="msg" style="letter-spacing: 12px; font-size: 10px; opacity: 0.5;">2GBX_NYC_ENVIRONMENT</div><div id="bar-frame"><div id="bar-fill"></div></div></div>
    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <script>
    const MEDIA_ASSETS = {
        videos: [
            "media/expl_0001.mp4",
            "media/MOSS_ROCK_0001.mp4",
            "media/CLIP INTERIOR.mp4",
            "media/CLIP_LAB.mp4"
        ],
        images: [
            "media/SCREEN_00.png",
            "media/SCREEN_02.png"
        ],
        colors: []
    };

    const MEDIA_OVERRIDES = {
        "Hero_Screen": { type: "video", url: "media/MOSS_ROCK_0001.mp4", emissive: 20.0 }
    };

    const AAA_CONFIG = {
        camera: { fov: 0.85, height: 4.0, speed: 2.2, inertia: 0.5, angularSens: 300, pos: { x: 60, z: 150 } },
        godCamera: { alpha: -Math.PI/4, beta: Math.PI/3, radius: 400, fov: 0.4 },
        atmosphere: {
            color: "#000000",
            fogDensity: 0.001,
            fogNear: 600,
            fogFar: 700,
            ambientIntensity: 0.05
        },
        mediaIntensity: 5.0,
        colorGrading: { hue: 210, saturation: 25, value: 0.1 },
        lighting: { moon: { color: "#ffffff", intensity: 2.0 }, shadows: { enabled: true, darkness: 0.7, size: 1024 } },
        traffic: { density: 50, velocity: 0.035, bumperGap: 15.0, carSize: 1.0, laneWidth: 3.0 },
        materials: {
            "NYC_TERRAIN.glb":      { roughness: 0.1, metallic: 0.1, emissive: 0.1 },
            "NYC_BLOCKS.glb":       { roughness: 0.4, metallic: 0.4, emissive: 4.5 },
            "NYC_COLD-STORAGE.glb": { roughness: 0.5, metallic: 0.3, emissive: 1.5 },
            "NYC_railways.glb":     { roughness: 0.6, metallic: 0.7, emissive: 2.5 },
            "NYC_SITE_BUILDING.glb":{ roughness: 0.3, metallic: 0.6, emissive: 2.0 },
            "NYC_robot.glb":        { roughness: 0.2, metallic: 0.9, emissive: 6.0 }, 
            "NYC_street_props.glb": { roughness: 0.5, metallic: 0.2, emissive: 3.0 },
            "NYC_HUDSON_YARD.glb":  { roughness: 0.4, metallic: 0.4, emissive: 5.0 },
            "NYC_DSR.glb":          { roughness: 0.3, metallic: 0.7, emissive: 6.0 },
            "NYC_MEDIA.glb":        { roughness: 0.0, metallic: 0.0, emissive: 10.0 },
            "NYC_HIGHLINE.glb":     { roughness: 0.4, metallic: 0.5, emissive: 3.5 }
        },
        postProcess: { exposure: 0.9, contrast: 1.5, bloomWeight: 1.8, bloomThreshold: 0.8, hazeWeight: 3.6 }
    };

    (function() {
        const canvas = document.getElementById("renderCanvas");
        const coordUI = document.getElementById("coord-val");
        const targetUI = document.getElementById("target-id");
        const unitUI = document.getElementById("unit-count");
        let engine, scene;
        let activeCamera, fpsCamera, godCamera;
        let cars = [], adjacency = {}, carTemplate = null;

        const start = async () => {
            engine = new BABYLON.Engine(canvas, true, { adaptToDeviceRatio: true });
            scene = new BABYLON.Scene(engine);
            
            const syncColor = BABYLON.Color3.FromHexString(AAA_CONFIG.atmosphere.color);
            scene.clearColor = syncColor.toColor4(1);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
            scene.fogColor = syncColor;
            scene.fogDensity = AAA_CONFIG.atmosphere.fogDensity;

            const hemi = new BABYLON.HemisphericLight("GI", new BABYLON.Vector3(0, 1, 0), scene);
            hemi.intensity = AAA_CONFIG.atmosphere.ambientIntensity;

            // 1. Setup FPS Camera
            fpsCamera = new BABYLON.FreeCamera("HeroCam", new BABYLON.Vector3(AAA_CONFIG.camera.pos.x, AAA_CONFIG.camera.height, AAA_CONFIG.camera.pos.z), scene);
            fpsCamera.rotation.y = Math.PI; 
            fpsCamera.angularSensibility = AAA_CONFIG.camera.angularSens;
            fpsCamera.inertia = AAA_CONFIG.camera.inertia;
            fpsCamera.speed = AAA_CONFIG.camera.speed;
            fpsCamera.keysUp = [87]; fpsCamera.keysDown = [83]; fpsCamera.keysLeft = [65]; fpsCamera.keysRight = [68];

            // 2. Setup God's Eye Camera (Orbital)
            godCamera = new BABYLON.ArcRotateCamera("GodCam", AAA_CONFIG.godCamera.alpha, AAA_CONFIG.godCamera.beta, AAA_CONFIG.godCamera.radius, new BABYLON.Vector3(0, 0, 0), scene);
            godCamera.lowerRadiusLimit = 10;
            godCamera.upperRadiusLimit = 1000;
            godCamera.fov = AAA_CONFIG.godCamera.fov;
            godCamera.panningSensibility = 50; // Allow right-click/two-finger drag to fly around

            // Initialize with FPS
            activeCamera = fpsCamera;
            scene.activeCamera = activeCamera;
            activeCamera.attachControl(canvas, true);

            // UI Switcher Logic
            const btnFps = document.getElementById("btn-fps");
            const btnGod = document.getElementById("btn-god");

            const switchCamera = (toGod) => {
                activeCamera.detachControl(canvas);
                if (toGod) {
                    activeCamera = godCamera;
                    btnGod.classList.add("active");
                    btnFps.classList.remove("active");
                } else {
                    activeCamera = fpsCamera;
                    btnFps.classList.add("active");
                    btnGod.classList.remove("active");
                }
                scene.activeCamera = activeCamera;
                activeCamera.attachControl(canvas, true);
            };

            btnFps.onclick = () => switchCamera(false);
            btnGod.onclick = () => switchCamera(true);

            const sun = new BABYLON.DirectionalLight("Sun", new BABYLON.Vector3(0.5, -1, 0.5), scene);
            sun.intensity = AAA_CONFIG.lighting.moon.intensity;
            const csm = new BABYLON.CascadedShadowGenerator(AAA_CONFIG.lighting.shadows.size, sun);

            const manager = new BABYLON.AssetsManager(scene);

            const networkTask = manager.addMeshTask("network", "", "./", "NYC_STREET_lines.glb");
            networkTask.onSuccess = (t) => {
                t.loadedMeshes.forEach(m => {
                    m.computeWorldMatrix(true);
                    const pos = m.getVerticesData(BABYLON.VertexBuffer.PositionKind);
                    const ind = m.getIndices();
                    if (pos && ind) {
                        const mat = m.getWorldMatrix();
                        const worldV = [];
                        for (let i = 0; i < pos.length; i += 3) {
                            worldV.push(BABYLON.Vector3.TransformCoordinates(new BABYLON.Vector3(pos[i], pos[i+1], pos[i+2]), mat));
                        }
                        for (let j = 0; j < ind.length; j += 2) {
                            const p1 = worldV[ind[j]], p2 = worldV[ind[j+1]];
                            const k1 = `${p1.x.toFixed(1)},${p1.z.toFixed(1)}`, k2 = `${p2.x.toFixed(1)},${p2.z.toFixed(1)}`;
                            if(!adjacency[k1]) adjacency[k1] = { pos: p1, next: [] };
                            if(!adjacency[k2]) adjacency[k2] = { pos: p2, next: [] };
                            adjacency[k1].next.push(k2); adjacency[k2].next.push(k1);
                        }
                    }
                    m.isVisible = false;
                });
            };

            const carTask = manager.addMeshTask("car", "", "./", "NYC_car.glb");
            carTask.onSuccess = (t) => {
                carTemplate = new BABYLON.Mesh("carTemplate", scene);
                t.loadedMeshes.forEach(m => { m.setParent(carTemplate); m.isPickable = false; });
                carTemplate.setEnabled(false);
            };

            const mediaTask = manager.addMeshTask("media", "", "./", "NYC_MEDIA.glb");
            mediaTask.onSuccess = (t) => {
                t.loadedMeshes.forEach((m, index) => {
                    let settings;
                    if (MEDIA_OVERRIDES[m.name]) {
                        settings = MEDIA_OVERRIDES[m.name];
                    } else {
                        const typeChoice = index % 3; 
                        if (typeChoice === 0 && MEDIA_ASSETS.videos.length > 0) {
                            settings = { type: "video", url: MEDIA_ASSETS.videos[index % MEDIA_ASSETS.videos.length], emissive: 12.0 };
                        } else if (typeChoice === 1 && MEDIA_ASSETS.images.length > 0) {
                            settings = { type: "image", url: MEDIA_ASSETS.images[index % MEDIA_ASSETS.images.length], emissive: 8.0 };
                        } else {
                            settings = { type: "color", url: MEDIA_ASSETS.colors[index % MEDIA_ASSETS.colors.length], emissive: 15.0 };
                        }
                    }
                    const mat = new BABYLON.PBRMaterial("mat_" + m.name, scene);
                    mat.unlit = true; 
                    mat.emissiveIntensity = settings.emissive * AAA_CONFIG.mediaIntensity;
                    if (settings.type === "video") {
                        const vTex = new BABYLON.VideoTexture("vid_" + m.name, settings.url, scene, true);
                        vTex.video.muted = true; vTex.video.loop = true;
                        mat.albedoTexture = vTex; mat.emissiveTexture = vTex;
                        mat.emissiveColor = new BABYLON.Color3(1, 1, 1);
                        window.addEventListener("click", () => vTex.video.play(), { once: true });
                    } 
                    else if (settings.type === "image") {
                        const iTex = new BABYLON.Texture(settings.url, scene);
                        mat.albedoTexture = iTex; mat.emissiveTexture = iTex;
                        mat.emissiveColor = new BABYLON.Color3(1, 1, 1);
                    } 
                    else if (settings.type === "color") {
                        const col = BABYLON.Color3.FromHexString(settings.url);
                        mat.albedoColor = col; mat.emissiveColor = col;
                    }
                    m.material = mat;
                });
            };

            Object.keys(AAA_CONFIG.materials).forEach(file => {
                if (file === "NYC_MEDIA.glb") return;
                const t = manager.addMeshTask(file, "", "./", file);
                t.onSuccess = (s) => {
                    s.loadedMeshes.forEach(m => {
                        const cfg = AAA_CONFIG.materials[file] || {};
                        csm.addShadowCaster(m);
                        m.receiveShadows = true;
                        if (m.material) {
                            m.material.roughness = cfg.roughness;
                            m.material.metallic = cfg.metallic;
                            m.material.emissiveIntensity = cfg.emissive;
                        }
                    });
                };
            });

            manager.onFinish = () => {
                document.getElementById("loading-overlay").style.display = "none";
                const pipe = new BABYLON.DefaultRenderingPipeline("p", true, scene, [fpsCamera, godCamera]);
                pipe.bloomEnabled = true;
                pipe.bloomWeight = AAA_CONFIG.postProcess.bloomWeight;
                pipe.imageProcessingEnabled = true;
                pipe.imageProcessing.exposure = AAA_CONFIG.postProcess.exposure;
                pipe.imageProcessing.contrast = AAA_CONFIG.postProcess.contrast;

                engine.runRenderLoop(() => { 
                    if (activeCamera === fpsCamera) {
                        fpsCamera.position.y = AAA_CONFIG.camera.height;
                    }
                    coordUI.innerText = `${activeCamera.position.x.toFixed(2)} // ${activeCamera.position.y.toFixed(2)} // ${activeCamera.position.z.toFixed(2)}`;
                    if(Object.keys(adjacency).length > 0) {
                        while(cars.length < AAA_CONFIG.traffic.density) spawnCar();
                        updateTraffic();
                    }
                    unitUI.innerText = `${cars.length} UNITS_ACTIVE`;
                    const ray = scene.createPickingRay(canvas.width / 2, canvas.height / 2, BABYLON.Matrix.Identity(), activeCamera);
                    const hit = scene.pickWithRay(ray);
                    targetUI.innerText = (hit.hit && hit.pickedMesh) ? (hit.pickedMesh.name.split('_')[1] || hit.pickedMesh.name) : "Void_Null";
                    scene.render(); 
                });
            };
            manager.load();
        };

        function spawnCar() {
            if (!carTemplate) return;
            const keys = Object.keys(adjacency);
            const startK = keys[Math.floor(Math.random() * keys.length)];
            const car = carTemplate.clone("c");
            car.setEnabled(true);
            const nextK = adjacency[startK].next[0] || startK;
            cars.push({ mesh: car, curr: startK, next: nextK, t: Math.random(), stuck: 0 });
        }

        function updateTraffic() {
            const up = new BABYLON.Vector3(0, 1, 0);
            cars.forEach((c, i) => {
                let blocked = false;
                for(let j=0; j<cars.length; j++) {
                    if(i === j) continue;
                    if(BABYLON.Vector3.Distance(c.mesh.position, cars[j].mesh.position) < AAA_CONFIG.traffic.bumperGap) {
                        const myDir = adjacency[c.next].pos.subtract(adjacency[c.curr].pos).normalize();
                        const toOther = cars[j].mesh.position.subtract(c.mesh.position).normalize();
                        if(BABYLON.Vector3.Dot(toOther, myDir) > 0.8) { blocked = true; break; }
                    }
                }
                if(!blocked) { c.t += AAA_CONFIG.traffic.velocity; c.stuck = 0; }
                else { c.stuck++; if (c.stuck > 100) c.t += AAA_CONFIG.traffic.velocity * 0.2; }
                if (c.t >= 1.0) {
                    const opts = adjacency[c.next].next;
                    const ch = opts.filter(k => k !== c.curr);
                    c.curr = c.next; 
                    c.next = ch.length > 0 ? ch[Math.floor(Math.random() * ch.length)] : opts[0];
                    c.t = 0;
                }
                const p1 = adjacency[c.curr].pos, p2 = adjacency[c.next].pos;
                const dir = p2.subtract(p1).normalize();
                const lane = BABYLON.Vector3.Cross(dir, up).normalize().scale(AAA_CONFIG.traffic.laneWidth / 2);
                c.mesh.position = BABYLON.Vector3.Lerp(p1, p2, c.t).add(lane);
                c.mesh.lookAt(c.mesh.position.add(dir));
            });
        }
        start();
        window.addEventListener("resize", () => engine.resize());
    })();
    </script>
</body>
</html>
